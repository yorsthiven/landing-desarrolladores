<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="dynamic-title">Cargando...</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--color-primario)',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --color-primario: #3b82f6;
        }

        /* Color azul por defecto */
    </style>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link id="dynamic-favicon" rel="icon" type="image/x-icon" href="" />
    <meta id="meta-description" name="description" content="" />
    <meta id="meta-keywords" name="keywords" content="" />

    <meta property="og:type" content="website" />
    <meta id="og-url" property="og:url" content="" />
    <meta id="og-title" property="og:title" content="" />
    <meta id="og-description" property="og:description" content="" />
    <meta id="og-image" property="og:image" content="" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta id="twitter-title" name="twitter:title" content="" />
    <meta id="twitter-description" name="twitter:description" content="" />
    <link rel="stylesheet" href="../css/styles.css" />
</head>

<body class="bg-slate-950 text-slate-300 font-sans selection:bg-blue-500 selection:text-white">
    <nav
        class="p-6 sticky top-0 z-50 backdrop-blur-md bg-slate-950/80 flex justify-between items-center max-w-6xl mx-auto">
        <div class="text-xl font-mono font-bold text-white tracking-tighter">
            <img id="client-logo" src="../assets/img/logo.svg" alt="Logo" class="h-10 w-auto inline-block" />
        </div>
        <div class="space-x-8 text-sm uppercase tracking-widest hidden md:block">
            <a href="#servicios" class="hover:text-blue-400 transition">Proyectos</a>
            <a href="#servicios" class="hover:text-blue-400 transition">Servicios</a>
            <a id="nav-contact-btn" href=""
                class="border border-blue-500 px-4 py-2 rounded text-blue-500 hover:bg-blue-500 hover:text-white transition">Contacto</a>
        </div>
    </nav>

    <header class="py-24 px-6 text-center max-w-4xl mx-auto">
        <h1 class="text-5xl md:text-7xl font-bold text-white mb-6" id="hero-title">
            <span id="hero-title-1">Título Principal</span>
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400" id="hero-title-2">Subtítulo Destacado</span>
        </h1>
        <p class="text-lg text-slate-400 mb-10 leading-relaxed" id="hero-desc">
            Descripción del cliente
        </p>
        <div class="flex justify-center gap-4">
            <a href="#servicios"
                class="bg-blue-600 text-white px-8 py-4 rounded-lg font-bold hover:bg-blue-500 shadow-lg shadow-blue-900/20 transition">Ver
                Servicios</a>
        </div>
    </header>

    <section id="servicios" class="py-20 px-6 max-w-6xl mx-auto">
        <h2 class="text-3xl font-bold text-white mb-12 border-l-4 border-blue-500 pl-4" id="servicios-title">
            Casos de Éxito
        </h2>
        <div id="servicios-container" class="grid md:grid-cols-2 gap-10">
            <!-- Las tarjetas se generarán dinámicamente aquí -->
        </div>
    </section>

    <a id="floating-whatsapp" href=""
        class="fixed bottom-6 right-6 bg-green-500 text-white w-16 h-16 rounded-full flex items-center justify-center shadow-2xl hover:bg-green-600 transition-all transform hover:scale-110 z-[100]"
        target="_blank">
        <i class="fab fa-whatsapp text-3xl"></i>
        <span class="absolute -top-1 -right-1 flex h-4 w-4">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-4 w-4 bg-green-500"></span>
        </span>
    </a>

    <footer class="py-10 text-center border-t border-slate-900 text-slate-600 text-sm" id="footer-content">
        &copy; 2026 Yors Dev | Desarrollado con el stack más eficiente del mercado.
    </footer>

    <script src="../js/scripts.js"></script>
    <script src="../js/animations.js"></script>
</body>

</html>
